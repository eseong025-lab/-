<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시네마틱 페어틀 메이커 v4</title>
    <style>
        /* 업로드해주신 사용자 지정 폰트 적용 (Base64 인코딩 내장) */
        @font-face {
            font-family: 'CustomFont';
            src: url('data:font/ttf;base64,AAEAAAASAQAABAAgR0RFRgA...') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #0a0a0c;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --panel-bg: rgba(26, 26, 32, 0.85);
            --input-bg: rgba(40, 40, 50, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: rgba(255, 255, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'CustomFont', 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(32, 32, 45, 0.7) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(20, 20, 35, 0.7) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            justify-content: center;
            align-items: center;
            max-width: 1100px;
            width: 100%;
        }

        /* 고급 미니멀 UI 제어판 */
        .controls-panel {
            flex: 1;
            min-width: 340px;
            max-width: 420px;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .controls-panel h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            color: #fff;
            text-align: center;
        }

        .control-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 9px;
            font-size: 0.8rem;
            color: #aaa;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* 파일 업로드 래퍼 */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 48px;
            background-color: var(--input-bg);
            border: 1px dashed var(--input-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload-wrapper:hover {
            border-color: var(--input-focus);
            background-color: rgba(50, 50, 65, 0.8);
        }

        .file-upload-wrapper span {
            font-size: 0.9rem;
            color: #ccc;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: #fff;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
        }

        textarea {
            resize: none;
            height: 85px;
            line-height: 1.5;
        }

        button.download-btn {
            width: 100%;
            padding: 16px;
            background-color: #fff;
            color: #050505;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 10px;
        }

        button.download-btn:hover {
            background-color: #e4e4e7;
            transform: translateY(-2px);
        }

        /* 영화 포스터 프리뷰 스크린 */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .poster-frame {
            width: 420px;
            height: 594px;
            background-color: #030305;
            position: relative;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 45px 0px;
            justify-content: space-between;
            overflow: hidden;
        }

        .poster-top-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 0 35px;
            z-index: 2;
        }

        #output-sub-title {
            font-size: 0.75rem;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        #output-main-title {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 3px;
            margin: 0;
            color: #fff;
            word-break: keep-all;
        }

        /* 시네마틱 이미지 & 가우시안 소프트 블러 레이어 */
        .poster-middle-container {
            position: relative;
            height: 260px;
            width: 100%;
            overflow: hidden;
        }

        .poster-middle-photo {
            width: 100%;
            height: 100%;
            background-color: #0a0a0c;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .poster-middle-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .upload-placeholder {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 2px;
        }

        .blur-overlay-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, #030305 0%, rgba(3, 3, 5, 0.8) 30%, rgba(3, 3, 5, 0) 100%);
            pointer-events: none;
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .blur-overlay-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to top, #030305 0%, rgba(3, 3, 5, 0.8) 30%, rgba(3, 3, 5, 0) 100%);
            pointer-events: none;
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .poster-bottom-footer {
            margin-top: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 0 35px;
            z-index: 2;
        }

        #output-sentence {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            margin: 0;
            white-space: pre-line;
            word-break: keep-all;
            font-weight: 300;
        }

        .poster-credits {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 880px) {
            .poster-frame { width: 340px; height: 480px; padding: 35px 0px; }
            .poster-middle-container { height: 200px; }
            #output-main-title { font-size: 1.6rem; }
            #output-sentence { font-size: 0.85rem; }
        }
    </style>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

<div class="main-container">
    <div class="controls-panel">
        <h1>페어틀 메이커 v4</h1>
        
        <div class="control-group">
            <label>1. 포스터 사진 등록</label>
            <div class="file-upload-wrapper">
                <span id="file-status-text">이미지 파일 선택</span>
                <input type="file" id="input-file" accept="image/*" onchange="loadPhoto(this)">
            </div>
        </div>

        <div class="control-group">
            <label>2. 메인 타이틀</label>
            <input type="text" id="input-main-title" placeholder="그 여름의 끝에서" onkeyup="updateText()">
        </div>

        <div class="control-group">
            <label>3. 서브 타이틀</label>
            <input type="text" id="input-sub-title" placeholder="MEMORIES OF US" onkeyup="updateText()">
        </div>

        <div class="control-group">
            <label>4. 하단 감성 문장</label>
            <textarea id="input-sentence" placeholder="함께 걷던 거리에 서면&#10;언제나 네가 서 있을 것만 같아." onkeyup="updateText()"></textarea>
        </div>

        <div class="control-group">
            <label>5. 푸터 크레딧</label>
            <input type="text" id="input-credits" placeholder="Directed by Pair  •  2026.06" onkeyup="updateText()">
        </div>

        <button class="download-btn" onclick="downloadPoster()">포스터 이미지 저장</button>
    </div>

    <div class="preview-container">
        <div class="poster-frame" id="poster-area">
            
            <div class="poster-top-header">
                <div id="output-sub-title">MEMORIES OF US</div>
                <h2 id="output-main-title">그 여름의 끝에서</h2>
            </div>

            <div class="poster-middle-container">
                <div class="blur-overlay-top"></div>
                <div class="poster-middle-photo">
                    <img id="poster-image" src="#" alt="Poster Main">
                    <div class="upload-placeholder" id="placeholder-text">IMAGE AREA</div>
                </div>
                <div class="blur-overlay-bottom"></div>
            </div>

            <div class="poster-bottom-footer">
                <p id="output-sentence">함께 걷던 거리에 서면&#10;언제나 네가 서 있을 것만 같아.</p>
                <div class="poster-credits" id="output-credits">Directed by Pair  •  2026.06</div>
            </div>

        </div>
    </div>
</div>

<script>
    function loadPhoto(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            document.getElementById('file-status-text').innerText = file.name;
            document.getElementById('file-status-text').style.color = '#fff';

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('poster-image');
                const placeholder = document.getElementById('placeholder-text');
                img.src = e.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    function updateText() {
        const mainTitle = document.getElementById('input-main-title').value || '그 여름의 끝에서';
        const subTitle = document.getElementById('input-sub-title').value || 'MEMORIES OF US';
        const sentence = document.getElementById('input-sentence').value || '함께 걷던 거리에 서면\n언제나 네가 서 있을 것만 같아.';
        const credits = document.getElementById('input-credits').value || 'Directed by Pair  •  2026.06';

        document.getElementById('output-main-title').innerText = mainTitle;
        document.getElementById('output-sub-title').innerText = subTitle;
        document.getElementById('output-sentence').innerText = sentence;
        document.getElementById('output-credits').innerText = credits;
    }

    function downloadPoster() {
        const imgCheck = document.getElementById('poster-image').src.includes('data:image');
        if(!imgCheck) {
            alert('가운데 영역에 넣을 사진을 먼저 등록해 주세요.');
            return;
        }

        const posterArea = document.getElementById('poster-area');
        const btn = document.querySelector('.download-btn');
        btn.innerText = '포스터 생성 중...';
        btn.disabled = true;

        html2canvas(posterArea, {
            scale: 3, 
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#030305'
        }).then(canvas => {
            const image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.href = image;
            link.download = `movie-poster-${Date.now()}.png`;
            link.click();

            btn.innerText = '포스터 이미지 저장';
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
