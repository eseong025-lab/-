<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 포스터 페어틀 메이커 v3</title>
    <style>
        /* [1. 전체 레이아웃 및 테마] */
        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --accent-color: #e5e5e5;
            --panel-bg: #1a1a1a;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1200px;
            width: 100%;
        }

        /* [2. 제어판 스타일] */
        .controls-panel {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .controls-panel h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            background-color: #262626;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #555;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        input[type="file"] {
            color: #888;
            font-size: 0.85rem;
        }

        button.download-btn {
            width: 100%;
            padding: 14px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 15px;
        }

        button.download-btn:hover {
            background-color: #e6e6e6;
        }
        
        button.download-btn:active {
            transform: scale(0.99);
        }

        /* [3. 세로형 영화 포스터 프리뷰 스타일] */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 20px;
        }

        /* 세로형 영화 포스터 비율 규격 (A4 비율 기반) */
        .poster-frame {
            width: 420px;
            height: 594px;
            background-color: #050505;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 35px 0px; /* 좌우 여백을 없애서 사진이 가로로 꽉 차게 변경 */
            justify-content: space-between;
        }

        /* [상단 영역] 제목 */
        .poster-top-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 0 25px;
        }

        #output-sub-title {
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        #output-main-title {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
            color: #fff;
            word-break: keep-all;
        }

        /* [가운데 영역] 사진 공간 (테두리 제거 및 세로 크기 축소) */
        .poster-middle-photo {
            height: 280px; /* 세로 크기 고정 및 축소 (기본 flex에서 고정 크기로 변경) */
            width: 100%;
            background-color: #121212;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* 테두리(border, border-radius) 및 여백 완전 제거 */
        }

        .poster-middle-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .upload-placeholder {
            font-size: 0.85rem;
            color: #333;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.6;
        }

        /* [하단 영역] 설명 문장 및 정보 */
        .poster-bottom-footer {
            margin-top: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 25px;
        }

        #output-sentence {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.7;
            margin: 0;
            white-space: pre-line;
            word-break: keep-all;
        }

        .poster-credits {
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 1.5px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* 반응형 디자인 */
        @media (max-width: 880px) {
            .poster-frame {
                width: 340px;
                height: 480px;
                padding: 25px 0px;
            }
            .poster-middle-photo {
                height: 220px;
            }
            #output-main-title { font-size: 1.5rem; }
            #output-sentence { font-size: 0.8rem; }
        }
    </style>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

<div class="main-container">
    <div class="controls-panel">
        <h1>포스터 스타일 변경 v3</h1>
        
        <div class="control-group">
            <label>1. 가운데 사진 등록</label>
            <input type="file" id="input-file" accept="image/*" onchange="loadPhoto(this)">
        </div>

        <div class="control-group">
            <label>2. 상단 메인 제목</label>
            <input type="text" id="input-main-title" placeholder="그 여름의 끝에서" onkeyup="updateText()">
        </div>

        <div class="control-group">
            <label>3. 상단 작은 부제목</label>
            <input type="text" id="input-sub-title" placeholder="MEMORIES OF US" onkeyup="updateText()">
        </div>

        <div class="control-group">
            <label>4. 하단 감성 문장 (줄바꿈 가능)</label>
            <textarea id="input-sentence" placeholder="함께 걷던 거리에 서면&#10;언제나 네가 서 있을 것만 같아." onkeyup="updateText()"></textarea>
        </div>

        <div class="control-group">
            <label>5. 하단 크레딧 (이름/날짜 등)</label>
            <input type="text" id="input-credits" placeholder="Directed by Pair  •  2026.06" onkeyup="updateText()">
        </div>

        <button class="download-btn" onclick="downloadPoster()">포스터 이미지 저장</button>
    </div>

    <div class="preview-container">
        <div class="poster-frame" id="poster-area">
            
            <div class="poster-top-header">
                <div id="output-sub-title">MEMORIES OF US</div>
                <h2 id="output-main-title">그 여름의 끝에서</h2>
            </div>

            <div class="poster-middle-photo">
                <img id="poster-image" src="#" alt="Poster Main">
                <div class="upload-placeholder" id="placeholder-text">
                    IMAGE AREA
                </div>
            </div>

            <div class="poster-bottom-footer">
                <p id="output-sentence">함께 걷던 거리에 서면&#10;언제나 네가 서 있을 것만 같아.</p>
                <div class="poster-credits" id="output-credits">Directed by Pair  •  2026.06</div>
            </div>

        </div>
    </div>
</div>

<script>
    // 1. 사진 불러오기 기능
    function loadPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('poster-image');
                const placeholder = document.getElementById('placeholder-text');
                
                img.src = e.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 2. 텍스트 실시간 동기화 기능
    function updateText() {
        const mainTitle = document.getElementById('input-main-title').value || '그 여름의 끝에서';
        const subTitle = document.getElementById('input-sub-title').value || 'MEMORIES OF US';
        const sentence = document.getElementById('input-sentence').value || '함께 걷던 거리에 서면\n언제나 네가 서 있을 것만 같아.';
        const credits = document.getElementById('input-credits').value || 'Directed by Pair  •  2026.06';

        document.getElementById('output-main-title').innerText = mainTitle;
        document.getElementById('output-sub-title').innerText = subTitle;
        document.getElementById('output-sentence').innerText = sentence;
        document.getElementById('output-credits').innerText = credits;
    }

    // 3. 고화질 이미지 캡처 및 다운로드 기능
    function downloadPoster() {
        const imgCheck = document.getElementById('poster-image').src.includes('data:image');
        if(!imgCheck) {
            alert('가운데 영역에 넣을 사진을 먼저 등록해 주세요.');
            return;
        }

        const posterArea = document.getElementById('poster-area');
        const btn = document.querySelector('.download-btn');
        
        btn.innerText = '포스터 생성 중...';
        btn.disabled = true;

        html2canvas(posterArea, {
            scale: 3,
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#050505'
        }).then(canvas => {
            const image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.href = image;
            link.download = `movie-poster-${Date.now()}.png`;
            link.click();

            btn.innerText = '포스터 이미지 저장';
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
